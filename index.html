<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCU</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f1115;
  color: white;
}

/* 상단 */
.header {
  font-size: 32px;
  padding: 20px;
  font-weight: bold;
}

/* 프로 카드 */
.pro {
  margin: 10px;
  padding: 18px;
  border-radius: 20px;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}

.pro span {
  font-size: 14px;
}

/* 카드 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

.card {
  background: #1a1d24;
  border-radius: 20px;
  padding: 20px;
  text-align: left;
  transition: 0.2s;
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: scale(1.03);
  background: #22252d;
}

.icon {
  font-size: 28px;
  margin-bottom: 10px;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

.sub {
  font-size: 12px;
  color: #aaa;
}

/* 사이드 앱 */
.side {
  position: fixed;
  right: 0;
  top: 0;
  width: 95px;
  height: 100%;
  background: #0b0c10;
  padding-top: 20px;
  overflow-y: auto;
}

.side-item {
  text-align: center;
  margin-bottom: 20px;
  font-size: 12px;
  cursor: pointer;
}

.side-item div {
  font-size: 22px;
}

/* 계산기 */
.calc {
  display: none;
  padding: 15px;
}

.display {
  width: 100%;
  padding: 15px;
  font-size: 28px;
  border-radius: 15px;
  border: none;
  margin-bottom: 10px;
  background: #1a1d24;
  color: white;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.btn {
  padding: 20px;
  background: #2a2e38;
  text-align: center;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.btn:active {
  background: #3a3f4d;
}

.equal {
  background: #4facfe;
}

.clear {
  background: #ff4d4d;
  grid-column: span 4;
}

/* 광고 */
.ad {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1a1d24;
  text-align: center;
  padding: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">CALCU</div>

<div class="pro" onclick="buyPro()">
  💎 프로 업그레이드
  <span>광고 제거 + 기능 추가</span>
</div>

<!-- 메뉴 -->
<div id="menu" class="grid">
  <div class="card" onclick="openCalc()">
    <div class="icon">🧮</div>
    <div class="title">계산기</div>
    <div class="sub">기본 계산</div>
  </div>

  <div class="card">
    <div class="icon">💱</div>
    <div class="title">환율</div>
    <div class="sub">실시간 환율</div>
  </div>

  <div class="card">
    <div class="icon">📏</div>
    <div class="title">단위 변환</div>
    <div class="sub">길이/무게</div>
  </div>

  <div class="card">
    <div class="icon">📅</div>
    <div class="title">날짜 계산</div>
    <div class="sub">D-day 계산</div>
  </div>
</div>

<!-- 사이드 -->
<div class="side">
  <div class="side-item"><div>⏱️</div>타이머</div>
  <div class="side-item"><div>🔦</div>손전등</div>
  <div class="side-item"><div>📷</div>QR</div>
  <div class="side-item"><div>🎮</div>게임</div>
</div>

<!-- 계산기 -->
<div id="calc" class="calc">
  <input id="display" class="display" readonly>

  <div class="buttons">
    <div class="btn" onclick="press('7')">7</div>
    <div class="btn" onclick="press('8')">8</div>
    <div class="btn" onclick="press('9')">9</div>
    <div class="btn" onclick="press('/')">÷</div>

    <div class="btn" onclick="press('4')">4</div>
    <div class="btn" onclick="press('5')">5</div>
    <div class="btn" onclick="press('6')">6</div>
    <div class="btn" onclick="press('*')">×</div>

    <div class="btn" onclick="press('1')">1</div>
    <div class="btn" onclick="press('2')">2</div>
    <div class="btn" onclick="press('3')">3</div>
    <div class="btn" onclick="press('-')">−</div>

    <div class="btn" onclick="press('0')">0</div>
    <div class="btn" onclick="press('.')">.</div>
    <div class="btn equal" onclick="calculate()">=</div>
    <div class="btn" onclick="press('+')">+</div>

    <div class="btn clear" onclick="clearDisplay()">C</div>
  </div>

  <div class="btn" onclick="back()">← 뒤로가기</div>
</div>

<div id="ad" class="ad">📢 광고 영역</div>

<script>
let display = document.getElementById("display");

function press(v){ display.value += v; }
function calculate(){
  try { display.value = eval(display.value); }
  catch { alert("오류"); }
}
function clearDisplay(){ display.value=""; }

function openCalc(){
  menu.style.display="none";
  calc.style.display="block";
}
function back(){
  menu.style.display="grid";
  calc.style.display="none";
}

function buyPro(){
  localStorage.setItem("pro","true");
  alert("프로 구매 완료");
  location.reload();
}

if(localStorage.getItem("pro")==="true"){
  document.getElementById("ad").style.display="none";
}
</script>

</body>
</html>

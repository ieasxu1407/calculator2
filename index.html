<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALCU</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f1115;
  color: white;
}

/* 상단바 */
.topbar {
  display: flex;
  align-items: center;
  padding: 15px;
  font-size: 22px;
}

.menu-btn {
  font-size: 26px;
  margin-right: 15px;
  cursor: pointer;
}

/* 사이드 메뉴 */
.sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #1a1d24;
  transition: 0.3s;
  padding-top: 60px;
  z-index: 10;
}

.sidebar.open {
  left: 0;
}

.sidebar div {
  padding: 15px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.sidebar div:hover {
  background: #2a2e38;
}

/* 계산기 */
.calc {
  padding: 15px;
}

.display {
  width: 100%;
  padding: 15px;
  font-size: 28px;
  border-radius: 15px;
  border: none;
  margin-bottom: 10px;
  background: #1a1d24;
  color: white;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.btn {
  padding: 20px;
  background: #2a2e38;
  text-align: center;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.btn:active {
  background: #3a3f4d;
}

.equal {
  background: #4facfe;
}

.clear {
  background: #ff4d4d;
  grid-column: span 4;
}

/* 프로 카드 (메뉴 안) */
.pro {
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  text-align: center;
}

/* 광고 */
.ad {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1a1d24;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<!-- 상단 -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  CALCU
</div>

<!-- 사이드 메뉴 -->
<div id="sidebar" class="sidebar">
  <div class="pro" onclick="buyPro()">💎 프로 업그레이드</div>

  <div onclick="alert('환율 준비중')">💱 환율</div>
  <div onclick="alert('단위 준비중')">📏 단위 변환</div>
  <div onclick="alert('날짜 준비중')">📅 날짜 계산</div>
  <div onclick="alert('타이머 준비중')">⏱️ 타이머</div>
</div>

<!-- 계산기 -->
<div class="calc">
  <input id="display" class="display" readonly>

  <div class="buttons">
    <div class="btn" onclick="press('7')">7</div>
    <div class="btn" onclick="press('8')">8</div>
    <div class="btn" onclick="press('9')">9</div>
    <div class="btn" onclick="press('/')">÷</div>

    <div class="btn" onclick="press('4')">4</div>
    <div class="btn" onclick="press('5')">5</div>
    <div class="btn" onclick="press('6')">6</div>
    <div class="btn" onclick="press('*')">×</div>

    <div class="btn" onclick="press('1')">1</div>
    <div class="btn" onclick="press('2')">2</div>
    <div class="btn" onclick="press('3')">3</div>
    <div class="btn" onclick="press('-')">−</div>

    <div class="btn" onclick="press('0')">0</div>
    <div class="btn" onclick="press('.')">.</div>
    <div class="btn equal" onclick="calculate()">=</div>
    <div class="btn" onclick="press('+')">+</div>

    <div class="btn clear" onclick="clearDisplay()">C</div>
  </div>
</div>

<div id="ad" class="ad">📢 광고 영역</div>

<script>
// 계산기
let display = document.getElementById("display");

function press(v){ display.value += v; }
function calculate(){
  try { display.value = eval(display.value); }
  catch { alert("오류"); }
}
function clearDisplay(){ display.value=""; }

// 메뉴
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

// 프로
function buyPro(){
  localStorage.setItem("pro","true");
  alert("프로 구매 완료");
  location.reload();
}

// 광고 제거
if(localStorage.getItem("pro")==="true"){
  document.getElementById("ad").style.display="none";
}
</script>

</body>
</html>
